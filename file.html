<!DOCTYPE html>
<html>
    <head>
        <title> HTML and Forms </title>
    </head>
    <body>
        <h1> HTML and Forms </h1> 
        <form action="https://www.cs.hmc.edu/~rhodes/cgi-bin/query.py">
            <label for = "red_button">Red: </label>
            <input type = "radio" id = "red_button" name = "color" value = "red" checked="checked"><br>
            <label for = "blue_button">Blue: </label>
            <input type = "radio" id = "blue_button" name = "color" value = "blue"><br>
            <label for = "yellow_button">Yellow: </label>
            <input type = "radio" id = "yellow_button" name = "color" value = "yellow"><br>

            <br>
            <label for = "north_button">North: </label>
            <input type = "radio" id = "north_button" name = "direction" value = "north" checked="checked"><br>
            <label for = "south_button">South: </label>
            <input type = "radio" id = "south_button" name = "direction" value = "south"><br>
            <label for = "east_button"> East: </label>
            <input type = "radio" id = "east_button" name = "direction" value = "east"><br>
            <label for = "west_button"> West: </label>
            <input type = "radio" id = "west_button" name = "direction" value = "west"><br>
            
            <br>
            <label for = "breakfast">Had Breakfast: </label>
            <input type = "checkbox" id = "breakfast" name = "has_breakfast"><br>
            <label for = "lunch">Had Lunch: </label>
            <input type = "checkbox" id = "lunch" name = "has_lunch"><br>
            <label for = "dinner">Had Dinner: </label>
            <input type = "checkbox" id = "dinner" name = "has_dinner"><br>

            <br>

            <label for = "name">Name </label>
            <input type = "text" id = "name" name = "input_name"><br>
            <label for = "age">Age </label>
            <input type = "text" id = "age" name = "input_age"><br>

            <label for = "birthday">Birthday </label>
            <input type = "date" id = "birthday" name = "input_birthday"><br>

            <br>

            <input type="submit" value="Submit">

        </form>
    </body>
</html>
